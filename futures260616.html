<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">

<title>品种信息汇总 · 2026年6月16日</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#f0f2f5;color:#1a1d2e;font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;}

/* ── 顶栏 ── */
.hd{position:sticky;top:0;z-index:200;background:#fff;border-bottom:1px solid #e4e8f0;padding:12px 16px 0;}
.hd-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.hd-title{font-size:16px;font-weight:700;}
.hd-meta{font-size:11px;color:#7a7f9a;}
.sr{display:flex;align-items:center;background:#f7f8fa;border:1px solid #e4e8f0;border-radius:8px;padding:0 10px;margin-bottom:10px;gap:6px;}
.si{color:#a0a5bc;font-size:15px;flex-shrink:0;}
#search{flex:1;border:none;background:transparent;font-size:14px;color:#1a1d2e;padding:9px 0;outline:none;width:100%;}
#search::-webkit-search-cancel-button{display:none;}
.xbtn{display:none;border:none;background:none;color:#a0a5bc;font-size:18px;padding:2px 4px;cursor:pointer;flex-shrink:0;line-height:1;}
.xbtn.on{display:block;}
.tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;-webkit-overflow-scrolling:touch;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex-shrink:0;border:1px solid #e4e8f0;border-radius:20px;background:#f7f8fa;color:#7a7f9a;font-size:12px;font-weight:500;padding:5px 12px;cursor:pointer;white-space:nowrap;}
.tab .n{opacity:.75;font-size:10px;margin-left:2px;}

/* ── 统计栏 ── */
.stats{padding:8px 16px;font-size:11px;color:#7a7f9a;}
.stats b{color:#3a5ee8;}

/* ══════════════════════════════
   手机布局：折叠卡片列表
══════════════════════════════ */
.mobile-list{padding:8px 12px 60px;display:flex;flex-direction:column;gap:8px;}
.mcard{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.07);}
.mcard.hide{display:none;}
.mcard-hd{display:flex;align-items:center;padding:11px 14px;border-left:4px solid #ccc;cursor:pointer;gap:8px;}
.mcard-name{font-size:14px;font-weight:600;flex:1;min-width:0;}
.mcard-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.badge{font-size:10px;font-weight:600;letter-spacing:.3px;padding:2px 7px;border-radius:10px;}
.chv{color:#a0a5bc;font-size:14px;transition:transform .2s;flex-shrink:0;line-height:1;}
.mcard.open .chv{transform:rotate(90deg);}
.km{display:flex;border-top:1px solid #e4e8f0;}
.km-cell{flex:1;background:#f7f8fa;padding:7px 4px;text-align:center;border-right:1px solid #e4e8f0;}
.km-cell:last-child{border-right:none;}
.km-lbl{font-size:9px;color:#a0a5bc;letter-spacing:.3px;margin-bottom:2px;}
.km-val{font-size:13px;font-weight:700;color:#3a5ee8;font-family:'Menlo','Courier New',monospace;}
.mcard-body{display:none;padding:12px 14px 14px;border-top:1px solid #e4e8f0;}
.mcard.open .mcard-body{display:block;}

/* ══════════════════════════════
   桌面布局
══════════════════════════════ */
.desktop-grid{display:none;}

@media(min-width:768px){
  body{font-size:13px;}
  .hd{padding:16px 24px 0;}
  .hd-title{font-size:16px;}
  .tabs{padding-bottom:10px;}
  .tab{border-radius:4px;padding:4px 10px;}
  .stats{padding:10px 24px;border-bottom:1px solid #e4e8f0;}
  .mobile-list{display:none;}
  .desktop-grid{display:flex;flex-wrap:wrap;gap:12px;padding:16px 24px 40px;}
  .dcard{background:#fff;border:1px solid #dde1ec;border-radius:8px;overflow:hidden;width:calc(50% - 6px);min-width:420px;}
  .dcard.hide{display:none;}
  .dcard-hd{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#f0f2f7;border-bottom:1px solid #dde1ec;gap:8px;}
  .dcard-name{font-size:14px;font-weight:600;}
  .dcard-ex{font-size:11px;font-weight:600;letter-spacing:.5px;flex-shrink:0;}
  .dcard-body{padding:12px 14px;}
  .g2{display:flex;gap:12px;margin-bottom:10px;}
  .g2 .sec{flex:1;}
}

/* ── 共用内容样式 ── */
.sec-t{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:#7a7f9a;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid #e4e8f0;}
.row{display:flex;justify-content:space-between;align-items:baseline;padding:5px 0;border-bottom:1px solid #f0f2f5;}
.row:last-child{border-bottom:none;}
.rl{font-size:12px;color:#7a7f9a;flex-shrink:0;margin-right:8px;}
.rv{font-family:'Menlo','Courier New',monospace;font-size:12px;text-align:right;max-width:58%;word-break:break-all;}
.rv.bl{color:#2a4fd4;font-weight:600;}
.rv.or{color:#c26000;}
.cb-box{background:#fffbf0;border:1px solid #ffe4a0;border-radius:8px;padding:8px 11px;margin-bottom:10px;}
.cb-lbl{font-size:10px;color:#9a7000;letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px;}
.cb-table{width:100%;border-collapse:collapse;font-size:11px;}
.cb-table th{color:#9a7000;font-weight:600;padding:2px 5px;text-align:left;border-bottom:1px solid #ffe4a0;}
.cb-table td{padding:3px 5px;color:#7a5500;font-family:'Menlo','Courier New',monospace;border-bottom:1px dotted #ffe4a0;}
.cb-table tr:last-child td{border-bottom:none;}
.cb-table td:first-child{color:#9a7000;font-family:inherit;}
/* 限仓区块 */
.pl-box{background:#f0f4ff;border:1px solid #c8d6ff;border-radius:8px;padding:8px 11px;margin-bottom:10px;}
.pl-lbl{font-size:10px;color:#2a4fd4;letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px;font-weight:700;}
.pl-table{width:100%;border-collapse:collapse;font-size:11px;}
.pl-table th{color:#2a4fd4;font-weight:600;padding:2px 5px;text-align:left;border-bottom:1px solid #c8d6ff;}
.pl-table td{padding:3px 5px;color:#1a3a8a;border-bottom:1px dotted #c8d6ff;}
.pl-table tr:last-child td{border-bottom:none;}
.pl-table td:last-child{font-family:'Menlo','Courier New',monospace;text-align:right;}
.nb{background:#f0f4ff;border-left:3px solid #3a5ee8;border-radius:0 8px 8px 0;padding:8px 10px;font-size:12px;color:#3a4a80;line-height:1.6;margin-top:10px;}
.empty{text-align:center;padding:60px 20px;color:#7a7f9a;font-size:14px;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:#f4f6f9;}
::-webkit-scrollbar-thumb{background:#dde1ec;border-radius:3px;}
</style>

function cbTableHtml(cbArr){
  if(!cbArr||cbArr.length===0)return"—";
  var rows=cbArr.filter(function(r){return r[0]&&r[0]!=="3个同向停板后交易所根据市场情况决定公告措施"&&r[0]!=="3个同向停板后暂停交易1天";});
  var note=cbArr.find(function(r){return r[0]&&(r[0].indexOf("3个同向")>-1);});
  var html="<table class=\"cb-table\"><thead><tr><th>停板情形</th><th>初始保证金</th><th>结算保证金</th></tr></thead><tbody>";
  rows.forEach(function(r){
    html+="<tr><td>"+r[0]+"</td><td>"+pp(r[1])+"</td><td>"+pp(r[2])+"</td></tr>";
  });
  html+="</tbody></table>";
  if(note)html+="<div style=\"margin-top:4px;font-size:10px;color:#9a7000;\">"+note[0]+"</div>";
  return html;
}

function plTableHtml(plArr){
  if(!plArr||plArr.length===0)return"";
  var html="<table class=\"pl-table\"><thead><tr><th>持仓阶段</th><th>限仓额度</th></tr></thead><tbody>";
  plArr.forEach(function(r){
    html+="<tr><td>"+r[0]+"</td><td>"+r[1]+"</td></tr>";
  });
  html+="</tbody></table>";
  return html;
}

function innerRows(c){
  var restr=(c.delivery_restriction&&c.delivery_restriction!=="None")?c.delivery_restriction:null;
  var notes=(c.notes&&c.notes!=="None")?c.notes:null;
  var cbHtml=cbTableHtml(c.cb_with_margin||[]);
  var plHtml=plTableHtml(c.position_limits||[]);
  return(
    "<div class=\"sec\" style=\"margin-bottom:14px\">"+
      "<div class=\"sec-t\">保证金梯度</div>"+
      
      "<div class=\"row\"><span class=\"rl\">初始保证金</span><span class=\"rv\">"+pp(c.init_margin)+"</span></div>"+
      "<div class=\"row\"><span class=\"rl\">结算保证金</span><span class=\"rv\">"+pp(c.settle_margin)+"</span></div>"+
      "<div class=\"row\"><span class=\"rl\">前一月触发日</span><span class=\"rv\">"+ff(c.delivery_prev1_day)+"</span></div>"+
      "<div class=\"row\"><span class=\"rl\">前一月保证金</span><span class=\"rv bl\">"+pp(c.delivery_prev1_margin)+"</span></div>"+
      "<div class=\"row\"><span class=\"rl\">交割月保证金</span><span class=\"rv bl\">"+pp(c.delivery_month_margin)+"</span></div>"+
    "</div>"+
    "<div class=\"sec\" style=\"margin-bottom:14px\">"+
      "<div class=\"sec-t\">合约规格</div>"+
      "<div class=\"row\"><span class=\"rl\">最小波动</span><span class=\"rv\">"+ff(c.tick_size)+"</span></div>"+
      "<div class=\"row\"><span class=\"rl\">最大下单</span><span class=\"rv\">"+ff(c.max_order)+"</span></div>"+
      "<div class=\"row\"><span class=\"rl\">合约月份</span><span class=\"rv\">"+ff(c.contract_months)+"</span></div>"+
      "<div class=\"row\"><span class=\"rl\">最后交易日</span><span class=\"rv\">"+ff(c.last_trade_day)+"</span></div>"+
      "<div class=\"row\"><span class=\"rl\">交割日</span><span class=\"rv\">"+ff(c.delivery_day)+"</span></div>"+
      (restr?"<div class=\"row\"><span class=\"rl\">自然人限制</span><span class=\"rv or\">"+restr+"</span></div>":"")+
    "</div>"+
    "<div class=\"cb-box\"><div class=\"cb-lbl\">涨跌停板梯度 · 保证金对照</div>"+cbHtml+"</div>"+
    (plHtml?"<div class=\"pl-box\"><div class=\"pl-lbl\">限仓规定</div>"+plHtml+"</div>":"")+
    (notes?"<div class=\"nb\">📌 "+notes+"</div>":"")
  );
}

var tabsEl=document.getElementById("tabs");
var byEx={};
DATA.forEach(function(c){byEx[c.exchange]=(byEx[c.exchange]||0)+1;});
EO.forEach(function(ex){
  if(!byEx[ex])return;
  var b=document.createElement("button");
  b.className="tab";b.dataset.f=ex;
  b.innerHTML=ex+" <span class=\"n\">"+byEx[ex]+"</span>";
  tabsEl.appendChild(b);
});

var tabAll=document.getElementById("tab-all");
tabAll.style.background="#3a5ee8";tabAll.style.borderColor="#3a5ee8";tabAll.style.color="#fff";

      "</div>"+

      (plHtml?"<div class=\"pl-box\"><div class=\"pl-lbl\">限仓规定</div>"+plHtml+"</div>":"")+
      (notes?"<div class=\"nb\">📌 "+notes+"</div>":"")+
    "</div>";
  dgridEl.appendChild(d);
  return d;

var searchEl=document.getElementById("search");
var xbtn=document.getElementById("xbtn");
var vcEl=document.getElementById("vc");
var af="all",q="";

function upd(){
  var n=0;
  function filterCards(cards){
    cards.forEach(function(c){
      var ok=(af==="all"||c.dataset.ex===af)&&(!q||c.dataset.nm.indexOf(q)>-1);
      c.className=c.className.replace(" hide","")+(ok?"":" hide");
      if(ok)n++;
    });
  }
  filterCards(mCards);
  filterCards(dCards);
  vcEl.textContent=n/2;
  var empM=mlistEl.querySelector(".empty");
  var empD=dgridEl.querySelector(".empty");
  if(n===0){
    if(!empM){var e=document.createElement("div");e.className="empty";e.textContent="没有找到匹配的品种";mlistEl.appendChild(e);}
    if(!empD){var e2=document.createElement("div");e2.className="empty";e2.textContent="没有找到匹配的品种";dgridEl.appendChild(e2);}
  }else{
    if(empM)empM.remove();
    if(empD)empD.remove();
  }
}

document.querySelectorAll(".tab").forEach(function(b){
  b.addEventListener("click",function(){
    document.querySelectorAll(".tab").forEach(function(x){x.style.background="";x.style.borderColor="";x.style.color="";});
    var col=b.dataset.f==="all"?"#3a5ee8":(EC[b.dataset.f]||"#3a5ee8");
    b.style.background=col;b.style.borderColor=col;b.style.color="#fff";
    af=b.dataset.f;upd();
    b.scrollIntoView({behavior:"smooth",block:"nearest",inline:"center"});
  });
});

searchEl.addEventListener("input",function(){
  q=searchEl.value.trim().toLowerCase();
  xbtn.className=q?"xbtn on":"xbtn";
  upd();
});
xbtn.addEventListener("click",function(){
  searchEl.value="";q="";xbtn.className="xbtn";upd();
});

function tog(card){
  var cls=card.className;
  card.className=cls.indexOf("open")>-1?cls.replace(" open",""):cls+" open";
}
</script>
